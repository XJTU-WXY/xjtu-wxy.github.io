<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>FISSION Lab Web Toolbox</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .bg-image {
      position: fixed;
      inset: -20px;
      z-index: -3;
      background-image: url('https://picsum.photos/seed/fissionlab2024/1920/1080.jpg');
      background-size: cover;
      background-position: center;
      filter: saturate(1.3) brightness(0.85);
    }

    .bg-blobs {
      position: fixed;
      inset: -20px;
      z-index: -2;
      background:
        radial-gradient(circle at 15% 25%, rgba(255, 80, 180, 0.55), transparent 35%),
        radial-gradient(circle at 85% 20%, rgba(80, 180, 255, 0.55), transparent 35%),
        radial-gradient(circle at 75% 75%, rgba(150, 255, 130, 0.5), transparent 35%),
        radial-gradient(circle at 20% 80%, rgba(255, 200, 80, 0.5), transparent 35%);
      animation: blobsFloat 18s ease-in-out infinite alternate;
    }

    .bg-noise {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.04;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    @keyframes blobsFloat {
      0%   { transform: scale(1) rotate(0deg); }
      50%  { transform: scale(1.15) rotate(3deg); }
      100% { transform: scale(1.05) rotate(-2deg); }
    }

    main {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 36px;
    }

    .header {
      text-align: center;
      animation: fadeUp 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }
    .header h1, .header h2 { margin: 0; letter-spacing: -0.03em; }

    .glass-text {
      background: linear-gradient(135deg,
        rgba(255,255,255,1) 0%,
        rgba(255,255,255,0.7) 40%,
        rgba(255,255,255,0.95) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 6px 24px rgba(255,255,255,0.35))
              drop-shadow(0 2px 6px rgba(0,0,0,0.2));
    }
    .header h1 { font-size: clamp(2.4rem, 6.5vw, 4.2rem); font-weight: 800; line-height: 1.05; }
    .header h2 { font-size: clamp(1.1rem, 2.8vw, 1.7rem); font-weight: 300; margin-top: 6px; letter-spacing: 0.08em; }

    .glass-panel {
      width: 100%;
      max-width: 820px;
      padding: 28px;
      border-radius: 36px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.18),
        0 8px 32px rgba(0, 0, 0, 0.12),
        inset 0 1.5px 1px rgba(255, 255, 255, 0.55),
        inset 0 -1px 1px rgba(255, 255, 255, 0.12),
        inset 1px 0 1px rgba(255, 255, 255, 0.15),
        inset -1px 0 1px rgba(255, 255, 255, 0.15);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) 0.15s both;
    }

    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
      pointer-events: none;
    }

    .glass-panel::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .tool-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      text-decoration: none;
      color: white;
      padding: 26px 18px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: all 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 8px 24px rgba(0, 0, 0, 0.08),
        inset 0 1px 1px rgba(255, 255, 255, 0.35);
    }

    .tool-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(180deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
      border-radius: 26px 26px 0 0;
    }

    .tool-card::after {
      content: '';
      position: absolute;
      top: -100%; left: -100%;
      width: 60%; height: 60%;
      background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 70%);
      opacity: 0;
      transition: all 0.6s ease;
      pointer-events: none;
    }
    .tool-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow:
        0 24px 50px rgba(0, 0, 0, 0.2),
        0 0 0 1px rgba(255, 255, 255, 0.2),
        0 0 40px rgba(255, 255, 255, 0.15),
        inset 0 1px 1px rgba(255, 255, 255, 0.5);
    }
    .tool-card:hover::after { opacity: 1; top: 0; left: 0; }
    .tool-card:active { transform: translateY(-4px) scale(0.99); }

    .tool-icon {
      width: 58px; height: 58px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.6),
        inset 0 -1px 2px rgba(0, 0, 0, 0.05),
        0 4px 14px rgba(0, 0, 0, 0.08);
      transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
      z-index: 1;
    }
    .tool-card:hover .tool-icon { transform: scale(1.12) rotate(-6deg); }
    .tool-icon svg {
      width: 28px; height: 28px;
      stroke: white;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }

    .tool-info { position: relative; z-index: 1; }
    .tool-name {
      font-size: 1.08rem;
      font-weight: 600;
      margin-bottom: 3px;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
      letter-spacing: -0.01em;
    }
    .tool-desc {
      font-size: 0.82rem;
      opacity: 0.85;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.92);
      font-size: 0.88rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      animation: fadeUp 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) 0.4s both;
      letter-spacing: 0.02em;
    }
    footer a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding-bottom: 1px;
    }
    footer a:hover {
      border-bottom-color: white;
      text-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      main { padding: 24px 16px; gap: 28px; }
      .glass-panel { padding: 18px; border-radius: 28px; }
      .tools-grid { grid-template-columns: 1fr; gap: 12px; }
      .tool-card {
        flex-direction: row;
        text-align: left;
        padding: 16px 18px;
        border-radius: 20px;
      }
      .tool-card::before { border-radius: 20px 20px 0 0; }
      .tool-icon {
        width: 48px; height: 48px;
        margin-bottom: 0;
        margin-right: 14px;
        flex-shrink: 0;
        border-radius: 14px;
      }
      .tool-icon svg { width: 24px; height: 24px; }
      .tool-name { font-size: 1rem; }
      .tool-desc { font-size: 0.78rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="bg-blobs"></div>
  <div class="bg-noise"></div>

  <main>
    <header class="header">
      <h1 class="glass-text">FISSION Lab</h1>
      <h2 class="glass-text">Web Toolbox</h2>
    </header>

    <section class="glass-panel">
      <div class="tools-grid" id="toolsGrid">
      </div>
    </section>

    <footer>
      by <a href="https://github.com/XJTU-WXY" target="_blank" rel="noopener noreferrer">XJTU-WXY</a> @ FISSION Lab
    </footer>
  </main>

  <script>
    /* ==========================================================
       工具列表配置
       添加新工具：在下方数组中追加一个对象即可
       - name: 工具显示名称
       - desc: 工具简短描述（英文副标题）
       - url:  工具页面地址
       - icon: SVG 图标代码（viewBox="0 0 24 24"，用 stroke 描边风格）
       ========================================================== */
    const tools = [
      {
        name: 'RT-PCR Calc',
        desc: '反转录计算器',
        url: 'rt-calc.html',
        icon: `<svg viewBox="0 0 24 24">
          <path d="M4 4c0 5 4 8 8 8s8 3 8 8"/>
          <path d="M20 4c0 5-4 8-8 8s-8 3-8 8"/>
          <line x1="6" y1="6" x2="18" y2="6"/>
          <line x1="6" y1="18" x2="18" y2="18"/>
          <line x1="8" y1="9" x2="16" y2="9"/>
          <line x1="8" y1="15" x2="16" y2="15"/>
          <line x1="10" y1="12" x2="14" y2="12"/>
        </svg>`
      },
      {
        name: 'qRT-PCR Calc',
        desc: 'qPCR 计算器',
        url: 'qpcr-calc.html',
        icon: `<svg viewBox="0 0 24 24">
          <path d="M3 3v18h18"/>
          <path d="M7 14l3-3 3 3 5-7"/>
          <circle cx="7"  cy="14" r="1.3" fill="white" stroke="none"/>
          <circle cx="10" cy="11" r="1.3" fill="white" stroke="none"/>
          <circle cx="13" cy="14" r="1.3" fill="white" stroke="none"/>
          <circle cx="18" cy="7"  r="1.3" fill="white" stroke="none"/>
        </svg>`
      },
      {
        name: 'Click Counter',
        desc: '实验图像交互式手动计数器',
        url: './clickcounter.html',
        icon: `<svg viewBox="0 0 24 24">
          <path d="M9 11V6.5a2.5 2.5 0 0 1 5 0V11"/>
          <path d="M14 10V7.5a2 2 0 0 1 4 0V14c0 4-2.5 7-6.5 7H10c-1.5 0-2.8-.5-4-2l-3-3.5s-1-1.5 0-2.5 2.5 0 2.5 0L7 14"/>
        </svg>`
      }
      /* ---- 示例：添加新工具时按此格式追加 ----
      ,{
        name: '新工具',
        desc: 'New Tool',
        url: 'new-tool.html',
        icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>`
      }
      ---------------------------------------- */
    ];

    // 渲染工具卡片
    const grid = document.getElementById('toolsGrid');
    tools.forEach((tool, i) => {
      const card = document.createElement('a');
      card.href = tool.url;
      card.className = 'tool-card';
      card.style.animation = `fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) ${0.25 + i * 0.08}s both`;
      card.innerHTML = `
        <div class="tool-icon">${tool.icon}</div>
        <div class="tool-info">
          <div class="tool-name">${tool.name}</div>
          <div class="tool-desc">${tool.desc}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
