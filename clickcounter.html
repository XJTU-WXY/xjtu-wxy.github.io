<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #12141f;
    --panel:     #1c1f31;
    --panel2:    #252840;
    --border:    #32375a;
    --border2:   #474d78;
    --accent:    #5b7fe8;
    --accent2:   #7c9ff5;
    --accent-bg: rgba(91,127,232,0.12);
    --text:      #c8d0e8;
    --text-dim:  #7880a4;
    --text-inv:  #ffffff;
    --danger:    #e85b7a;
    --success:   #5be8a0;
    --radius:    8px;
    --shadow:    0 4px 24px rgba(0,0,0,0.4);
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    padding: 0 28px;
    height: 56px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  .header-logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 18px; height: 18px; fill: white; }
  h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: var(--text-inv); }
  h1 span { color: var(--accent2); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border: none; border-radius: var(--radius);
    font-size: 13px; font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn svg { width: 15px; height: 15px; flex-shrink: 0; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-ghost { background: var(--panel2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text-inv); background: var(--border); }
  .btn-danger { background: rgba(232,91,122,0.15); color: var(--danger); border: 1px solid rgba(232,91,122,0.3); }
  .btn-danger:hover { background: rgba(232,91,122,0.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-sm svg { width: 13px; height: 13px; }
  .btn-icon { padding: 5px 8px; }

  /* ── Main Layout ── */
  main { display: flex; flex: 1; overflow: hidden; }

  /* ── Canvas Panel ── */
  #canvas-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    background: #0d0f1a;
  }

  .canvas-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    font-size: 12px;
    color: var(--text-dim);
  }
  .canvas-toolbar .sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
  .info-badge {
    display: flex; align-items: center; gap: 5px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }
  .info-badge .label { color: var(--text-dim); }
  .info-badge .value { color: var(--accent2); }

  #viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
    cursor: crosshair;
  }
  #viewport.dragging { cursor: grabbing; }

  #img-layer {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    user-select: none;
  }
  #img-layer img {
    display: block;
    user-select: none;
    pointer-events: none;
    -webkit-user-drag: none;
  }
  #dots-layer {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    transform-origin: 0 0;
  }
  #dots-layer .dot {
    position: absolute;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: all;
    cursor: pointer;
    transition: filter 0.15s, transform 0.1s;
  }
  #dots-layer .dot:hover {
    filter: brightness(1.3) drop-shadow(0 0 6px currentColor);
    transform: translate(-50%, -50%) scale(1.2);
  }

  .empty-state {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    color: var(--text-dim);
  }
  .empty-state svg { width: 64px; height: 64px; opacity: 0.3; }
  .empty-state p { font-size: 14px; }

  /* ── Sidebar ── */
  #sidebar {
    width: 360px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border-left: 1px solid var(--border);
    overflow: hidden;
  }

  /* Settings */
  .settings-panel {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .settings-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 14px;
  }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .setting-item { display: flex; flex-direction: column; gap: 6px; }
  .setting-item label { font-size: 11px; color: var(--text-dim); font-weight: 500; }
  .setting-item .val { font-size: 12px; color: var(--accent2); font-family: 'JetBrains Mono', monospace; }
  .setting-row { display: flex; align-items: center; gap: 8px; }

  input[type="color"] {
    width: 36px; height: 30px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    background: var(--panel2);
    cursor: pointer; padding: 2px;
  }
  input[type="range"] {
    flex: 1; height: 4px;
    -webkit-appearance: none; appearance: none;
    background: var(--border2); border-radius: 2px;
    outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent); border-radius: 50%;
    border: 2px solid var(--panel);
    box-shadow: 0 0 4px rgba(91,127,232,0.5);
  }
  input[type="range"]:hover::-webkit-slider-thumb { background: var(--accent2); }

  /* File section */
  .file-section { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .file-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 8px; flex-shrink: 0; gap: 8px;
  }
  .file-header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .file-header-right { display: flex; gap: 6px; flex-shrink: 0; }
  .section-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--text-dim);
  }
  .file-count-badge {
    background: var(--accent-bg); color: var(--accent2);
    font-size: 11px; font-weight: 600;
    padding: 2px 7px; border-radius: 99px;
    font-family: 'JetBrains Mono', monospace;
  }

  .file-list-header {
    display: grid; grid-template-columns: 1fr 50px 32px;
    padding: 6px 16px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--text-dim); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }

  #file-list {
    flex: 1; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }
  #file-list::-webkit-scrollbar { width: 5px; }
  #file-list::-webkit-scrollbar-track { background: transparent; }
  #file-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .file-item {
    display: grid; grid-template-columns: 1fr 50px 32px;
    align-items: center;
    padding: 9px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(50,55,90,0.5);
    transition: background 0.1s;
  }
  .file-item:hover { background: var(--panel2); }
  .file-item.active {
    background: var(--accent-bg);
    border-left: 2px solid var(--accent);
    padding-left: 14px;
  }
  .file-name {
    font-size: 12px; color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .file-item.active .file-name { color: var(--accent2); }
  .file-count-cell {
    text-align: center; font-size: 13px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace; color: var(--text-dim);
  }
  .file-count-cell.has-marks { color: var(--success); }
  .file-del-btn {
    display: flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 5px;
    border: none; background: none;
    color: var(--text-dim); cursor: pointer;
    transition: background 0.1s, color 0.1s;
    font-size: 13px; line-height: 1;
  }
  .file-del-btn:hover { background: rgba(232,91,122,0.18); color: var(--danger); }
  .file-del-btn svg { width: 13px; height: 13px; pointer-events: none; }

  .file-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; height: 100%;
    color: var(--text-dim); font-size: 13px; text-align: center; padding: 24px;
  }
  .file-empty svg { width: 40px; height: 40px; opacity: 0.3; }

  /* Export bar */
  .export-bar {
    display: flex; gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--panel);
  }
  .export-bar .btn { flex: 1; justify-content: center; font-size: 12px; }

  /* Footer */
  footer {
    height: 34px;
    display: flex; align-items: center; justify-content: center;
    background: var(--panel); border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim); flex-shrink: 0; letter-spacing: 0.3px;
  }
  footer span { color: var(--accent2); font-weight: 500; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 50px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel2); border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 18px; font-size: 13px; color: var(--text-inv);
    box-shadow: var(--shadow); opacity: 0;
    transition: all 0.25s; pointer-events: none; z-index: 9999; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Loading Overlay */
  #loading-overlay {
    position: fixed; inset: 0;
    background: rgba(10,11,18,0.78);
    backdrop-filter: blur(3px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 99999;
  }
  #loading-overlay.show { display: flex; }
  .loading-card {
    background: var(--panel2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 28px 36px;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    min-width: 280px;
  }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 13px; color: var(--text);
    font-weight: 500;
  }
  .loading-progress-track {
    width: 220px; height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .loading-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    width: 0%;
    transition: width 0.15s ease-out;
  }
  .loading-count {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="14" r="3"/><circle cx="7" cy="17" r="2"/></svg>
    </div>
    <h1>Click <span>Counter</span></h1>
  </div>
</header>

<main>
  <!-- Canvas Panel -->
  <div id="canvas-panel">
    <div class="canvas-toolbar">
      <div class="info-badge">
        <span class="label">缩放</span>
        <span class="value" id="zoom-display">100%</span>
      </div>
      <div class="sep"></div>
      <div class="info-badge">
        <span class="label">标记数</span>
        <span class="value" id="count-display">0</span>
      </div>
      <div class="sep"></div>
      <div class="info-badge">
        <span class="label">坐标</span>
        <span class="value" id="coord-display">—</span>
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-danger btn-sm" onclick="clearAllDots()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        清除标记
      </button>
    </div>
    <div id="viewport">
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>导入图片以开始标记</p>
      </div>
      <div id="img-layer">
        <img id="main-img" alt="" draggable="false">
      </div>
      <div id="dots-layer"></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <!-- Settings -->
    <div class="settings-panel">
      <div class="settings-title">标记设置</div>
      <div class="settings-grid">
        <div class="setting-item">
          <div class="setting-row" style="justify-content: space-between; align-items: center;">
            <label style="margin:0;">颜色</label>
            <input type="color" id="dot-color" value="#ff4444">
          </div>
        </div>
        <div class="setting-item">
          <label>透明度 <span class="val" id="opacity-val">70%</span></label>
          <div class="setting-row">
            <input type="range" id="dot-opacity" min="10" max="100" value="70">
          </div>
        </div>
        <div class="setting-item">
          <label>直径 <span class="val" id="size-val">20px</span></label>
          <div class="setting-row">
            <input type="range" id="dot-size" min="6" max="60" value="20">
          </div>
        </div>
      </div>
    </div>

    <!-- File list -->
    <div class="file-section">
      <div class="file-header">
        <div class="file-header-left">
          <span class="section-title">图片列表</span>
          <span class="file-count-badge" id="file-count-badge">0</span>
        </div>
        <div class="file-header-right">
          <button class="btn btn-primary btn-sm" onclick="openFiles()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            打开图片
          </button>
          <button class="btn btn-danger btn-sm" onclick="clearFileList()" title="清空列表">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            清空
          </button>
        </div>
      </div>
      <div class="file-list-header">
        <span>文件名</span>
        <span style="text-align:center">标记数</span>
        <span></span>
      </div>
      <div id="file-list">
        <div class="file-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span>点击"打开图片"加载一批图片</span>
        </div>
      </div>
    </div>

    <!-- Export bar -->
    <div class="export-bar">
      <button class="btn btn-ghost" onclick="exportCSV()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导出 CSV
      </button>
      <button class="btn btn-ghost" onclick="exportJSON()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导出 JSON
      </button>
    </div>
  </div>
</main>

<footer>by <a href="https://github.com/XJTU-WXY" target="_blank"><span> XJTU-WXY </span></a> @ FISSION Lab</footer>

<div id="toast"></div>
<input type="file" id="file-input" multiple accept="image/*,.tif,.tiff" style="display:none">

<div id="loading-overlay">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">正在加载图片…</div>
    <div class="loading-progress-track">
      <div class="loading-progress-fill" id="loading-progress-fill"></div>
    </div>
    <div class="loading-count" id="loading-count">0 / 0</div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
const state = {
  files: [],      // [{file, name, dots:[{x,y}], url}]
  activeIdx: -1,
  zoom: 1,
  panX: 0, panY: 0,
  imgW: 0, imgH: 0,
  color: '#ff4444',
  opacity: 0.7,
  size: 20,
};

let midDragging = false;
let dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;
let didDrag = false;  // track if middle-drag moved, to suppress click

// ── DOM refs ──────────────────────────────────────────
const viewport   = document.getElementById('viewport');
const imgLayer   = document.getElementById('img-layer');
const dotsLayer  = document.getElementById('dots-layer');
const mainImg    = document.getElementById('main-img');
const emptyState = document.getElementById('empty-state');
const fileList   = document.getElementById('file-list');
const zoomDisp   = document.getElementById('zoom-display');
const countDisp  = document.getElementById('count-display');
const coordDisp  = document.getElementById('coord-display');
const fileCountBadge = document.getElementById('file-count-badge');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingText    = document.getElementById('loading-text');
const loadingFill    = document.getElementById('loading-progress-fill');
const loadingCount   = document.getElementById('loading-count');

function showLoading(text) {
  loadingText.textContent = text;
  loadingFill.style.width = '0%';
  loadingCount.textContent = '';
  loadingOverlay.classList.add('show');
}
function updateLoading(done, total) {
  const pct = total ? Math.round((done / total) * 100) : 0;
  loadingFill.style.width = pct + '%';
  loadingCount.textContent = `${done} / ${total}`;
}
function hideLoading() {
  loadingOverlay.classList.remove('show');
}

// Yield to the browser so the UI (progress bar) can repaint between
// heavy synchronous decode operations.
function nextFrame() {
  return new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
}

// ── Settings ──────────────────────────────────────────
document.getElementById('dot-color').addEventListener('input', e => {
  state.color = e.target.value; refreshAllDots();
});
document.getElementById('dot-opacity').addEventListener('input', e => {
  state.opacity = e.target.value / 100;
  document.getElementById('opacity-val').textContent = e.target.value + '%';
  refreshAllDots();
});
document.getElementById('dot-size').addEventListener('input', e => {
  state.size = parseInt(e.target.value);
  document.getElementById('size-val').textContent = e.target.value + 'px';
  refreshAllDots();
});

// ── TIF support via canvas ────────────────────────────
// Detect if browser can natively handle tif; if not, decode manually
function isTiff(file) {
  return /\.(tif|tiff)$/i.test(file.name) || file.type === 'image/tiff';
}

// Read a TIFF file and render it to a canvas, return blob URL
// Uses a lightweight approach: try native first, fall back to manual decode
async function loadTiffAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const buffer = e.target.result;
      try {
        const url = await decodeTiff(buffer);
        resolve(url);
      } catch(err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// Minimal TIFF decoder (baseline TIFF, 8-bit grayscale or RGB)
async function decodeTiff(buffer) {
  const data = new DataView(buffer);
  // Byte order
  const byteOrder = data.getUint16(0);
  const le = byteOrder === 0x4949; // little-endian
  const read16 = (o) => data.getUint16(o, le);
  const read32 = (o) => data.getUint32(o, le);

  const magic = read16(2);
  if (magic !== 42) throw new Error('Not a TIFF file');

  const ifdOffset = read32(4);

  // Parse IFD
  const tags = {};
  const numEntries = read16(ifdOffset);
  for (let i = 0; i < numEntries; i++) {
    const base = ifdOffset + 2 + i * 12;
    const tag  = read16(base);
    const type = read16(base + 2);
    const count= read32(base + 4);
    let value;
    // For SHORT (3) or LONG (4), read value or offset
    if (type === 3) { // SHORT
      value = count <= 2 ? read16(base + 8) : [];
      if (count > 2) { const off = read32(base+8); for(let j=0;j<count;j++) value.push(read16(off+j*2)); }
      else if (count === 2) value = [read16(base+8), read16(base+10)];
      else value = [value];
    } else if (type === 4) { // LONG
      value = count === 1 ? [read32(base + 8)] : [];
      if (count > 1) { const off = read32(base+8); for(let j=0;j<count;j++) value.push(read32(off+j*4)); }
    } else if (type === 1) { // BYTE
      value = count <= 4 ? [] : [];
      const off = count > 4 ? read32(base+8) : base+8;
      for(let j=0;j<count;j++) value.push(data.getUint8(off+j));
    } else {
      // For offsets stored as LONG in value field
      value = [read32(base + 8)];
    }
    tags[tag] = value;
  }

  const width       = (tags[256] || [0])[0];
  const height      = (tags[257] || [0])[0];
  const bitsPerSample = (tags[258] || [8]);
  const compression = (tags[259] || [1])[0];
  const photoInterp = (tags[262] || [2])[0]; // 1=BlackIsZero, 2=RGB
  const samplesPerPixel = (tags[277] || [1])[0];
  const stripOffsets = tags[273] || [];
  const stripByteCounts = tags[279] || [];
  const rowsPerStrip = (tags[278] || [height])[0];

  if (!width || !height) throw new Error('Invalid TIFF dimensions');
  if (compression !== 1) throw new Error('Only uncompressed TIFF supported');

  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(width, height);
  const px = imgData.data;

  const bps = bitsPerSample[0] || 8;
  const bytes = new Uint8Array(buffer);

  let pixelIdx = 0;
  for (let s = 0; s < stripOffsets.length; s++) {
    let off = stripOffsets[s];
    const rows = Math.min(rowsPerStrip, height - s * rowsPerStrip);
    const bytesPerRow = Math.ceil(width * samplesPerPixel * bps / 8);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < width; c++) {
        let R, G, B;
        if (samplesPerPixel >= 3) {
          if (bps === 16) {
            // 16-bit: read as uint16, scale to 8-bit
            const base = off + (r * width + c) * samplesPerPixel * 2;
            R = le ? (bytes[base+1]<<8|bytes[base])   >> 8 : (bytes[base]<<8|bytes[base+1])   >> 8;
            G = le ? (bytes[base+3]<<8|bytes[base+2]) >> 8 : (bytes[base+2]<<8|bytes[base+3]) >> 8;
            B = le ? (bytes[base+5]<<8|bytes[base+4]) >> 8 : (bytes[base+4]<<8|bytes[base+5]) >> 8;
          } else {
            const base = off + (r * width + c) * samplesPerPixel;
            R = bytes[base]; G = bytes[base+1]; B = bytes[base+2];
          }
        } else {
          // Grayscale
          if (bps === 16) {
            const base = off + (r * width + c) * 2;
            const v16 = le ? (bytes[base+1]<<8|bytes[base]) : (bytes[base]<<8|bytes[base+1]);
            R = G = B = v16 >> 8;
          } else {
            const base = off + r * width + c;
            R = G = B = bytes[base];
          }
          if (photoInterp === 0) { R = 255-R; G = 255-G; B = 255-B; } // WhiteIsZero
        }
        const i4 = pixelIdx * 4;
        px[i4]=R; px[i4+1]=G; px[i4+2]=B; px[i4+3]=255;
        pixelIdx++;
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);
  return canvas.toDataURL('image/png');
}

// ── File handling ─────────────────────────────────────
function openFiles() { document.getElementById('file-input').click(); }

document.getElementById('file-input').addEventListener('change', async e => {
  const files = Array.from(e.target.files);
  if (!files.length) return;

  showLoading('正在加载图片…');
  updateLoading(0, files.length);
  await nextFrame();

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    let url;
    if (isTiff(f)) {
      try {
        url = await loadTiffAsDataURL(f);
      } catch(err) {
        // Fallback: try native
        url = URL.createObjectURL(f);
      }
    } else {
      url = URL.createObjectURL(f);
    }
    state.files.push({ file: f, name: f.name, dots: [], url });
    updateLoading(i + 1, files.length);
    // Yield periodically so the progress UI updates and stays responsive
    if (i % 3 === 0) await nextFrame();
  }

  renderFileList();
  if (state.activeIdx === -1) selectFile(0);
  hideLoading();
  e.target.value = '';
});

function deleteFile(idx) {
  if (idx === state.activeIdx) {
    // Clear canvas
    state.activeIdx = -1;
    mainImg.src = '';
    dotsLayer.innerHTML = '';
    emptyState.style.display = '';
    countDisp.textContent = '0';
    zoomDisp.textContent = '100%';
    coordDisp.textContent = '—';
  }
  state.files.splice(idx, 1);
  // Fix activeIdx after deletion
  if (state.activeIdx > idx) state.activeIdx--;
  renderFileList();
}

function clearFileList() {
  state.files = [];
  state.activeIdx = -1;
  mainImg.src = '';
  dotsLayer.innerHTML = '';
  emptyState.style.display = '';
  countDisp.textContent = '0';
  zoomDisp.textContent = '100%';
  coordDisp.textContent = '—';
  renderFileList();
  toast('列表已清空');
}

function renderFileList() {
  fileCountBadge.textContent = state.files.length;
  if (!state.files.length) {
    fileList.innerHTML = `<div class="file-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg><span>点击"打开图片"加载一批图片</span></div>`;
    return;
  }
  fileList.innerHTML = state.files.map((f, i) => {
    const cnt = f.dots.length;
    return `<div class="file-item${i === state.activeIdx ? ' active' : ''}" onclick="selectFile(${i})" title="${f.name}">
      <div class="file-name">${f.name}</div>
      <div class="file-count-cell${cnt > 0 ? ' has-marks' : ''}">${cnt}</div>
      <button class="file-del-btn" onclick="event.stopPropagation();deleteFile(${i})" title="删除此图片">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
  }).join('');
}

function updateActiveRowCount() {
  if (state.activeIdx < 0) return;
  const rows = fileList.querySelectorAll('.file-item');
  const row = rows[state.activeIdx];
  if (!row) return;
  const cnt = state.files[state.activeIdx].dots.length;
  const cell = row.querySelector('.file-count-cell');
  if (cell) { cell.textContent = cnt; cell.className = 'file-count-cell' + (cnt > 0 ? ' has-marks' : ''); }
  countDisp.textContent = cnt;
}

function selectFile(idx) {
  state.activeIdx = idx;
  renderFileList();
  loadImage(state.files[idx]);
}

// ── Image loading ─────────────────────────────────────
function loadImage(entry) {
  emptyState.style.display = 'none';
  mainImg.onload = () => {
    state.imgW = mainImg.naturalWidth;
    state.imgH = mainImg.naturalHeight;
    mainImg.style.width  = state.imgW + 'px';
    mainImg.style.height = state.imgH + 'px';
    dotsLayer.style.width  = state.imgW + 'px';
    dotsLayer.style.height = state.imgH + 'px';
    fitToViewport();
  };
  mainImg.onerror = () => {
    emptyState.style.display = '';
    toast('图片加载失败');
  };
  mainImg.src = entry.url;
}

function fitToViewport() {
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  state.zoom = Math.min(vw / state.imgW, vh / state.imgH, 1) * 0.92;
  state.panX = (vw - state.imgW * state.zoom) / 2;
  state.panY = (vh - state.imgH * state.zoom) / 2;
  applyTransform();
  renderDots();
  countDisp.textContent = state.files[state.activeIdx]?.dots.length ?? 0;
}

function applyTransform() {
  const t = `translate(${state.panX}px, ${state.panY}px) scale(${state.zoom})`;
  imgLayer.style.transform = t;
  dotsLayer.style.transform = t;
  zoomDisp.textContent = Math.round(state.zoom * 100) + '%';
}

// ── Dot rendering ─────────────────────────────────────
function hexToRgb(hex) {
  return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
}

function renderDots() {
  dotsLayer.innerHTML = '';
  if (state.activeIdx < 0) return;
  state.files[state.activeIdx].dots.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'dot';
    el.style.left   = d.x + 'px';
    el.style.top    = d.y + 'px';
    el.style.width  = state.size + 'px';
    el.style.height = state.size + 'px';
    el.style.background = `rgba(${hexToRgb(state.color)},${state.opacity})`;
    el.style.boxShadow  = `0 0 0 1.5px rgba(${hexToRgb(state.color)},0.9)`;
    el.dataset.idx = i;
    el.addEventListener('contextmenu', onDotRightClick);
    dotsLayer.appendChild(el);
  });
}

function refreshAllDots() {
  dotsLayer.querySelectorAll('.dot').forEach(el => {
    el.style.width  = state.size + 'px';
    el.style.height = state.size + 'px';
    el.style.background = `rgba(${hexToRgb(state.color)},${state.opacity})`;
    el.style.boxShadow  = `0 0 0 1.5px rgba(${hexToRgb(state.color)},0.9)`;
  });
}

function addDot(imgX, imgY) {
  if (state.activeIdx < 0) return;
  state.files[state.activeIdx].dots.push({ x: imgX, y: imgY });
  renderDots();
  updateActiveRowCount();
}

// ── Viewport interaction ──────────────────────────────
viewport.addEventListener('click', e => {
  if (e.button !== 0) return;
  if (didDrag) return;
  if (state.activeIdx < 0) return;
  if (e.target.classList.contains('dot')) return;
  const rect = viewport.getBoundingClientRect();
  const imgX = (e.clientX - rect.left  - state.panX) / state.zoom;
  const imgY = (e.clientY - rect.top   - state.panY) / state.zoom;
  if (imgX < 0 || imgY < 0 || imgX > state.imgW || imgY > state.imgH) return;
  addDot(imgX, imgY);
});

viewport.addEventListener('mousemove', e => {
  if (state.activeIdx < 0) return;
  const rect = viewport.getBoundingClientRect();
  const imgX = Math.round((e.clientX - rect.left - state.panX) / state.zoom);
  const imgY = Math.round((e.clientY - rect.top  - state.panY) / state.zoom);
  coordDisp.textContent = (imgX>=0&&imgY>=0&&imgX<=state.imgW&&imgY<=state.imgH) ? `${imgX}, ${imgY}` : '—';
});
viewport.addEventListener('mouseleave', () => { coordDisp.textContent = '—'; });

// Scroll zoom
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newZoom = Math.min(Math.max(state.zoom * factor, 0.05), 20);
  state.panX = mx - (mx - state.panX) * (newZoom / state.zoom);
  state.panY = my - (my - state.panY) * (newZoom / state.zoom);
  state.zoom = newZoom;
  applyTransform();
}, { passive: false });

// Middle-button drag
viewport.addEventListener('mousedown', e => {
  if (e.button === 1) {
    e.preventDefault();
    midDragging = true; didDrag = false;
    dragStartX = e.clientX; dragStartY = e.clientY;
    panStartX = state.panX; panStartY = state.panY;
    viewport.classList.add('dragging');
  }
});
window.addEventListener('mousemove', e => {
  if (!midDragging) return;
  const dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
  if (Math.abs(dx) > 2 || Math.abs(dy) > 2) didDrag = true;
  state.panX = panStartX + dx;
  state.panY = panStartY + dy;
  applyTransform();
});
window.addEventListener('mouseup', e => {
  if (e.button === 1 && midDragging) {
    midDragging = false;
    viewport.classList.remove('dragging');
    // Use a short timeout so any immediately-following click on the
    // image (e.g. quick left-click right after releasing middle button)
    // is not misinterpreted, while not blocking genuinely new clicks.
    setTimeout(() => { didDrag = false; }, 0);
  }
});

// ── Right-click dot: delete immediately ──────────────
function onDotRightClick(e) {
  e.preventDefault();
  e.stopPropagation();
  const idx = parseInt(e.currentTarget.dataset.idx);
  if (state.activeIdx < 0) return;
  state.files[state.activeIdx].dots.splice(idx, 1);
  renderDots();
  updateActiveRowCount();
}

viewport.addEventListener('contextmenu', e => { e.preventDefault(); });

// ── Controls ──────────────────────────────────────────
function clearAllDots() {
  if (state.activeIdx < 0) return;
  state.files[state.activeIdx].dots = [];
  renderDots();
  updateActiveRowCount();
  toast('当前图片标记已清除');
}

// ── Export ────────────────────────────────────────────
function exportCSV() {
  if (!state.files.length) { toast('没有数据可导出'); return; }
  const rows = [['file_name', 'count']];
  state.files.forEach(f => rows.push([f.name, f.dots.length]));
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  download('click_counter_results.csv', 'text/csv', csv);
  toast('CSV 已导出');
}

function exportJSON() {
  if (!state.files.length) { toast('没有数据可导出'); return; }
  const data = state.files.map(f => ({
    file: f.name, count: f.dots.length,
    marks: f.dots.map(d => ({ x: Math.round(d.x), y: Math.round(d.y) })),
  }));
  download('click_counter_marks.json', 'application/json', JSON.stringify(data, null, 2));
  toast('JSON 已导出');
}

function download(filename, type, content) {
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([content], {type})),
    download: filename
  });
  a.click(); URL.revokeObjectURL(a.href);
}

// ── Toast ─────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
</script>
